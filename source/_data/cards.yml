# ---------------------------------------------------------------
# ⚠ 注意！
# ---------------------------------------------------------------
# Hexo 有两个配置文件，分别为位于站点根目录的「站点配置文件」和此处的「主题配置文件」
# 修改时注意对应配置文件，部分主题配置文件的内容可能需要复制到站点配置文件才能生效



# ---------------------------------------------------------------
# <head> 标签配置
# ---------------------------------------------------------------

head:

  # 网站图标
  favicon: /favicon.ico

  # 社交分享链接
  opengraph:
    enable: true
    type:
    twitter_card:
    twitter_id: justforlxz
    twitter_site:
    image:
    fb_admins:
    fb_app_id:

  # 自定义 head
  custom_head:
    # - ''
    # - ''



# ---------------------------------------------------------------
# 导航栏/封面配置
# ---------------------------------------------------------------

# 顶部导航栏设置
navbar:

  # 左侧名称显示
  sitename: 小竹's blog

  # 右侧站内导航链接
  menu:
    - name: 首页
      url: /
    - name: 标签
      url: /tags/
    - name: 分类
      url: /categories/
    - name: 归档
      url: /archives/
    - name: 友链
      url: /friends/
    - name: 关于
      url: /about/

  # 导航栏永远显示在屏幕顶端
  # 仅当屏幕宽度不小于 1080 px 时生效
  sticky: false

# 封面 cover 设置
cover:

  # 显示在最上方 cover 处的站点名称
  sitename: 小竹's blog

  # 若 avatar 配置不为空，则优先使用 avatar 覆盖 sitename
  avatar:

  # sitename/avatar 下方的一句话介绍
  description: 永远不要停止思考



# ---------------------------------------------------------------
# 样式自定义
# ---------------------------------------------------------------

style:

  # 颜色配置
  color:
    main_color: '#eb5757'

  # 弧度设置
  radius:
    main_radius: 5px

  # 间距设置
  space:
    main_space: 3.5rem
    sm_space: 1.5rem  # 当屏幕宽度小于 650px 时候启用

  # 默认代码高亮
  highlight:

    # 默认代码高亮主题
    default:

    # 暗色代码高亮主题
    darkmode:

  # highlight.js 代码高亮
  hljs:

    # 默认代码高亮主题
    default:

    # 暗色代码高亮主题
    darkmode:

  # prismjs 代码高亮
  prismjs:

    # 默认代码高亮主题
    default:

    # 暗色代码高亮主题
    darkmode:



# ---------------------------------------------------------------
# meta 库
# ---------------------------------------------------------------

meta:

  # 默认文章标题
  title: 'no title'

  # 默认文章作者（可在front-matter中覆盖）
  author:
    name: lxz
    url: https://blog.justforlxz.com/

  # 文章创建日期
  date:
    title: ''
    format: 'YYYY-MM-DD' # 日期格式 http://momentjs.com/docs/

  # 文章更新日期
  updated:
    title: ''
    format: 'YYYY-MM-DD' # 日期格式 http://momentjs.com/docs/

  # 文章缩略图
  thumbnail:
    enable: false
    default:   # 默认缩略图，当页面 `thumbnail` 字段为空时 fallback 至此参数

  # 文章过时提醒
  expire:
    enable: true
    duration: 120  # 超过此天数则显示过期提醒

  # 文章自动摘要
  auto_excerpt:
    enable: true
    length: 150

  # 文章目录
  toc:
    enable: true
    list_number: true

  # 文章版权声明
  copyright:
    enable: true

    # 在作者声明和永久链接之后，可以多行，支持 markdown
    custom_text:
      # - ''
      # - ''



# ---------------------------------------------------------------
# 评论系统
# ---------------------------------------------------------------

comments:
  use:  valine
  ## Valine
  valine:
    appId: 'jwJxh95ly6NdjTRluyKYXm6G-gzGzoHsz'
    appKey: 'lagqr7doy2slbm7oAMGoogpg'
    placeholder:
    path:
    avatar:
    meta: [nick, mail, link]
    pageSize:
    lang:
    visitor:
    highlight:
    avatarForce:
    recordIP:
    serverURLs: https://jwjxh95l.lc-cn-n1-shared.com
    enableQQ:
    requiredFields: [nick, mail]
    emojiCDN:
    emojiMaps:

# ---------------------------------------------------------------
# 统计服务
# ---------------------------------------------------------------

analytics:
  google_site_id: UA-129024325-1
  gtags_site_id:
  baidu_site_id: 49e5979358cb9ca19e5e56fc4adc4a98
  cnzz_site_id:

# ---------------------------------------------------------------
# 网站页脚
# ---------------------------------------------------------------

footer:

  # 设置站点起始时间，用于底部 copyright 显示
  # 例如：将此设为 `2018`，那么页脚就会显示 '© 2018 - 2020'（2020 为最后一次页面生成时间）
  # 如果将此项留空，则单独显示 '© 2020'（2020 为最后一次页面生成时间）
  # 如果你不想显示任何内容，请将此项设为 `false`
  copyright_since:

  # 网站计数
  statistics:

    # 选择 LeanCloud/busuanzi 为网站计数。如果你完全不想启用，将 `use` 项留空即可
    use: LeanCloud

    # 如果选择使用 LeanCloud，则需完善下面的配置项
    leancloud:
      appId: jwJxh95ly6NdjTRluyKYXm6G-gzGzoHsz
      appKey: lagqr7doy2slbm7oAMGoogpg
      serverURL: https://jwjxh95l.lc-cn-n1-shared.com

    # 全站 UV（Unique Viewers）
    site_uv:
      enable: true
      before_text: '' # 展示在数据前的内容，支持 HTML
      after_text: Viewers  # 展示在数据后的内容，支持 HTML
      divider: '&nbsp;&nbsp;&nbsp;|' # 分隔符，HTML 语法支持

    # 全站 PV（Page Views）
    site_pv:
      enable: true
      before_text: ''  # 展示在数据前的内容，支持 HTML
      after_text: Views  # 展示在数据后的内容，支持 HTML
      divider: ''  # 分隔符，HTML 语法支持

    # 页面 PV
    page_pv:
      enable: true
      before_text: ''
      after_text: Views

  # 自定义页脚，支持 markdown
  custom_text:
    # - ''
    # - ''



# ---------------------------------------------------------------
# 优化/功能 插件
# ---------------------------------------------------------------

# 图片懒加载插件
lazyload:
  enable: true
  loadingImage:

# 站内搜索插件
search:
  enable: true
  path: search.json
  field: All  # Page | Post | All

# note 标签插件
note: false

# fold 内容折叠插件
fold:
  enable: true
  summary:   # 默认摘要
  motion:

# 图片点击放大插件
fancybox:
  enable: true
  auto: true

# 返回顶部
back_to_top: true

# 深色模式
darkmode: true



# ---------------------------------------------------------------
# CDN for vendors
# ---------------------------------------------------------------

# Vendors
# 某一项留空则调用 默认/本地 文件
vendors:

  # main style css
  # https://cdn.jsdelivr.net/npm/hexo-theme-cards@1.0/dist/css/style/main.min.css
  # Version: 1.0
  # 如果你有自定义样式，请务必将此项修改为自己的 CDN 地址，或者单纯留空
  style:

  # darkmode
  # https://cdn.jsdelivr.net/npm/hexo-theme-cards@1.0/dist/css/style/dark.min.css
  # https://cdn.jsdelivr.net/npm/hexo-theme-cards@1.0/dist/js/darkmode.min.js
  # Version 1.0
  darkmode:
    css:
    js:

  # code highlight css
  # https://cdn.jsdelivr.net/npm/hexo-theme-cards@1.0/dist/css/highlight/
  # Version: 1.0
  highlight:

  # highlight.js theme
  # https://cdn.jsdelivr.net/npm/highlight.js@10.1.2/styles/
  # Version: 10.1.2
  hljs:

  # prism.js theme
  # https://cdn.jsdelivr.net/npm/prismjs@1.21.0/themes/
  # Version: 1.21.0
  prism:

  # tag-plugin note css
  # https://github.com/ChrAlpha/hexo-theme-cards
  # https://cdn.jsdelivr.net/npm/hexo-theme-cards@1.0/dist/css/style/note.min.css
  # Version 1.0
  note:

  # Lazyload js
  # https://github.com/verlok/lazyload
  # Version: 17.1.0
  lazyload:

  # back_to_top button
  # https://cdn.jsdelivr.net/npm/hexo-theme-cards@1.0/dist/js/b2t.min.js
  # Version 1.0
  back_to_top:

  # local search plugin
  # https://cdn.jsdelivr.net/npm/hexo-theme-cards@1.0/dist/js/local-search.min.js
  # Version 1.0
  local_search:

  # Valine comments system
  # https://github.com/xcss/Valine/
  # Version: 1.4.14
  valine:

  # MiniValine
  # https://github.com/MiniValine/MiniValine
  # Version 2.7.5
  minivaline:

  # Wildfire comments system
  # https://github.com/cheng-kang/wildfire/
  # Version: 0.3.9
  wildfire:

  # MathJax js
  # https://www.mathjax.org/
  # Version: 3
  mathjax:

  # busuanzi counter js
  # https://busuanzi.ibruce.info
  busuanzi:

  # jQuery js
  # https://github.com/jquery/jquery/
  # Version: 3.4.1
  jquery:

  # fancybox css
  # https://github.com/fancyapps/fancybox/
  # Version: 3.5.7
  fancybox:
    css:
    js:

  # 自定义 script
  custom_script:
    # - ''
    # - ''
